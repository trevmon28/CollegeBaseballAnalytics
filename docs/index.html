<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>College Baseball Analytics 2026</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:"Segoe UI",Inter,system-ui,sans-serif;min-height:100vh}
a{color:#06b6d4;text-decoration:none}
/* header */
#header{background:#0d1526;border-bottom:1px solid #1a2f52;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#header h1{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.3px}
#header .sub{font-size:11px;color:#4a6080;margin-top:2px}
#header .badge{background:#0f1c36;border:1px solid #1a2f52;border-radius:20px;padding:4px 12px;font-size:11px;color:#06b6d4;letter-spacing:.5px}
/* tabs */
#tab-nav{background:#0d1526;border-bottom:1px solid #1a2f52;display:flex;padding:0 24px}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:#4a6080;cursor:pointer;font-size:13px;font-weight:500;letter-spacing:.3px;padding:12px 18px;transition:.15s}
.tab-btn:hover{color:#e2e8f0}
.tab-btn.active{border-bottom-color:#06b6d4;color:#06b6d4}
/* content */
#content{padding:20px 24px;max-width:1400px;margin:0 auto}
.tab-panel{display:none}.tab-panel.active{display:block}
/* cards */
.kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.kpi{background:#0f1c36;border:1px solid #1a2f52;border-radius:10px;padding:14px 18px;min-width:130px}
.kpi-label{color:#4a6080;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.kpi-value{font-size:24px;font-weight:700;line-height:1.1;letter-spacing:-.5px}
.kpi-sub{color:#4a6080;font-size:11px;margin-top:3px}
/* filters */
.filter-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-label{color:#4a6080;font-size:10px;text-transform:uppercase;letter-spacing:1px}
select,input[type=text]{background:#0f1c36;border:1px solid #243d65;border-radius:7px;color:#e2e8f0;font-size:13px;padding:8px 12px;outline:none;cursor:pointer}
select:focus,input:focus{border-color:#06b6d4}
select option{background:#0f1c36}
.btn{background:#06b6d4;border:none;border-radius:8px;color:#000;cursor:pointer;font-size:13px;font-weight:700;padding:9px 20px;transition:.15s}
.btn:hover{background:#0891b2}
.btn-purple{background:#8b5cf6}.btn-purple:hover{background:#7c3aed}
/* table */
.tbl-wrap{overflow-x:auto;overflow-y:auto;max-height:520px;border-radius:8px;border:1px solid #1a2f52}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;z-index:10}
th{background:#1a2f52;color:#06b6d4;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:10px 12px;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:#243d65}
td{padding:8px 12px;border-bottom:1px solid #1a2f52;white-space:nowrap}
tr:nth-child(even) td{background:#0d1526}
tr:hover td{background:#1a2f52!important}
.rank-gold{border-left:3px solid #eab308}
.conf-badge{border-radius:4px;font-size:10px;font-weight:600;padding:2px 7px;color:#fff}
/* two-col layout */
.two-col{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
.two-col .col-main{flex:1;min-width:300px}
.two-col .col-side{width:400px;flex-shrink:0}
/* metric compare table */
.cmp-table{width:100%;border-collapse:collapse;font-size:13px}
.cmp-table th{color:#4a6080;font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:right}
.cmp-table th:first-child{text-align:left}
.cmp-table td{padding:7px 12px;border-bottom:1px solid #1a2f52;text-align:right}
.cmp-table td:first-child{text-align:left;color:#4a6080;font-size:12px}
.cmp-table td.win{font-weight:700}
.cmp-table .arrow{text-align:center;color:#eab308;padding:7px 4px;width:24px}
/* H2H */
.h2h-card{background:#0f1c36;border:1px solid #1a2f52;border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:13px}
/* predictor result */
.pred-card{background:#0f1c36;border:1px solid #1a2f52;border-radius:10px;padding:16px 20px;margin-bottom:14px}
.matchup-line{font-size:20px;font-weight:700;margin-bottom:14px}
/* responsive */
@media(max-width:768px){
  .two-col{flex-direction:column}
  .two-col .col-side{width:100%}
  #content{padding:12px}
  .kpi{min-width:100px}
}
</style>
</head>
<body>

<div id="header">
  <div>
    <h1>&#9918; College Baseball Analytics</h1>
    <div class="sub">Power Rankings &middot; Team Profiles &middot; Comparison &middot; Game Predictor</div>
  </div>
  <div class="badge">Season 2026 &nbsp;&bull;&nbsp; Conference-adjusted Elo + SOS</div>
</div>

<div id="tab-nav">
  <button class="tab-btn active" onclick="showTab('rankings')">Power Rankings</button>
  <button class="tab-btn" onclick="showTab('profile')">Team Profile</button>
  <button class="tab-btn" onclick="showTab('compare')">Compare Teams</button>
  <button class="tab-btn" onclick="showTab('predictor')">Game Predictor</button>
</div>

<div id="content">

<!-- ── RANKINGS ── -->
<div id="tab-rankings" class="tab-panel active">
  <div class="kpi-row" id="kpi-row"></div>
  <div class="filter-row">
    <div class="filter-group">
      <span class="filter-label">Conference</span>
      <select id="conf-filter" onchange="renderRankings()"></select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Search</span>
      <input type="text" id="team-search" placeholder="Filter teams..." oninput="renderRankings()" style="width:200px">
    </div>
  </div>
  <div class="two-col">
    <div class="col-main">
      <div class="tbl-wrap"><table id="rankings-table"><thead id="rankings-thead"></thead><tbody id="rankings-body"></tbody></table></div>
    </div>
    <div class="col-side">
      <div id="top25-chart" style="height:540px"></div>
    </div>
  </div>
</div>

<!-- ── PROFILE ── -->
<div id="tab-profile" class="tab-panel">
  <div class="filter-row">
    <div class="filter-group">
      <span class="filter-label">Team</span>
      <select id="profile-select" onchange="renderProfile(this.value)" style="min-width:280px"></select>
    </div>
  </div>
  <div id="profile-kpis" class="kpi-row"></div>
  <div id="profile-chart" style="height:380px"></div>
</div>

<!-- ── COMPARE ── -->
<div id="tab-compare" class="tab-panel">
  <div class="filter-row">
    <div class="filter-group">
      <span class="filter-label" style="color:#06b6d4">Team A</span>
      <select id="compare-a" style="min-width:240px"></select>
    </div>
    <div class="filter-group">
      <span class="filter-label" style="color:#8b5cf6">Team B</span>
      <select id="compare-b" style="min-width:240px"></select>
    </div>
    <div class="filter-group" style="justify-content:flex-end">
      <span class="filter-label">&nbsp;</span>
      <button class="btn" onclick="renderCompare()">Compare</button>
    </div>
  </div>
  <div id="compare-content"><p style="color:#4a6080">Select two teams and click Compare.</p></div>
</div>

<!-- ── PREDICTOR ── -->
<div id="tab-predictor" class="tab-panel">
  <div class="filter-row">
    <div class="filter-group">
      <span class="filter-label" style="color:#22c55e">Home Team</span>
      <select id="pred-home" style="min-width:240px"></select>
    </div>
    <div class="filter-group">
      <span class="filter-label" style="color:#ef4444">Away Team</span>
      <select id="pred-away" style="min-width:240px"></select>
    </div>
    <div class="filter-group" style="justify-content:flex-end;padding-bottom:2px">
      <label style="color:#4a6080;font-size:12px;cursor:pointer">
        <input type="checkbox" id="neutral-chk" style="width:14px;height:14px;margin-right:5px;vertical-align:middle">
        Neutral site
      </label>
    </div>
    <div class="filter-group" style="justify-content:flex-end">
      <span class="filter-label">&nbsp;</span>
      <button class="btn" style="background:#22c55e" onclick="renderPredictor()">Predict</button>
    </div>
  </div>
  <div id="pred-content"><p style="color:#4a6080">Select teams and click Predict.</p></div>
</div>

</div><!-- #content -->

// ── chart theme ───────────────────────────────────────────────────────────────

// ── utilities ─────────────────────────────────────────────────────────────────
function getPct(col, val, higher) {
  if (val == null) return 0;
  const vals = TEAMS.map(t => t[col]).filter(v => v != null);
  const below = vals.filter(v => higher ? v < val : v > val).length;
  return Math.round(below / vals.length * 100);
}
function norm01(col, val, higher) {
  if (val == null) return 0.5;
  const vals = TEAMS.map(t => t[col]).filter(v => v != null);
  const mn = Math.min(...vals), mx = Math.max(...vals);
  if (mn === mx) return 0.5;
  const n = (val - mn) / (mx - mn);
  return higher ? n : 1 - n;
}
function eloWP(ea, eb) { return 1 / (1 + Math.pow(10, (eb - ea) / 400)); }
function fmt(v, dec=3) { return v == null ? '—' : v.toFixed(dec); }
function fmtSign(v, dec=2) { return v == null ? '—' : (v >= 0 ? '+' : '') + v.toFixed(dec); }
function kpiHtml(label, value, sub='', color='#06b6d4') {
  return `<div class="kpi"><div class="kpi-label">${label}</div><div class="kpi-value" style="color:${color}">${value}</div><div class="kpi-sub">${sub}</div></div>`;
}
function confBadge(conf) {
  const c = CONF_CLR[conf] || '#4a6080';
  return `<span class="conf-badge" style="background:${c}80;border:1px solid ${c}">${conf}</span>`;
}
function populateSelect(id, placeholder='') {
  const sel = document.getElementById(id);
  if (!sel) return;
  sel.innerHTML = placeholder ? `<option value="">${placeholder}</option>` : '';
  TEAMS.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.team; opt.textContent = t.team;
    sel.appendChild(opt);
  });
}

// ── tab navigation ────────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'rankings') renderRankings();
  if (name === 'profile' && document.getElementById('profile-select').value) renderProfile(document.getElementById('profile-select').value);
}

// ── RANKINGS ─────────────────────────────────────────────────────────────────
const COLS = [
  {key:'rank',      label:'#',          dec:0, higher:false, sign:false},
  {key:'team',      label:'Team',       dec:-1},
  {key:'conference',label:'Conf',       dec:-1},
  {key:'wins',      label:'W',          dec:0},
  {key:'losses',    label:'L',          dec:0},
  {key:'pythagorean_win_pct', label:'Pythag W%', dec:3},
  {key:'avg_run_diff',        label:'Rd/G',      dec:2, sign:true},
  {key:'elo',                 label:'Elo',        dec:0},
  {key:'avg_opp_elo',         label:'SOS',        dec:0},
  {key:'power_score',         label:'Score',      dec:3},
];
let sortCol = 'rank', sortAsc = true;

function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = col === 'rank'; }
  renderRankings();
}
function renderRankings() {
  const conf   = document.getElementById('conf-filter').value;
  const search = (document.getElementById('team-search').value || '').toLowerCase();
  let data = TEAMS.filter(t =>
    (conf === 'ALL' || t.conference === conf) &&
    (!search || t.team.toLowerCase().includes(search))
  );
  data = [...data].sort((a,b) => {
    const va = a[sortCol], vb = b[sortCol];
    if (va == null) return 1; if (vb == null) return -1;
    return sortAsc ? (va < vb ? -1 : va > vb ? 1 : 0) : (va > vb ? -1 : va < vb ? 1 : 0);
  });

  // thead
  document.getElementById('rankings-thead').innerHTML =
    '<tr>' + COLS.map(c =>
      `<th onclick="sortBy('${c.key}')">${c.label}${sortCol===c.key?(sortAsc?' ↑':' ↓'):''}</th>`
    ).join('') + '</tr>';

  // tbody
  document.getElementById('rankings-body').innerHTML = data.map(t => {
    const cls = t.rank <= 5 ? 'rank-gold' : '';
    const cells = COLS.map(c => {
      if (c.key === 'team')       return `<td><strong>${t.team}</strong></td>`;
      if (c.key === 'conference') return `<td>${confBadge(t.conference)}</td>`;
      const v = t[c.key];
      const txt = v == null ? '—' : c.sign ? fmtSign(v, c.dec) : c.dec === 0 ? Math.round(v) : v.toFixed(c.dec);
      return `<td>${txt}</td>`;
    }).join('');
    return `<tr class="${cls}">${cells}</tr>`;
  }).join('');

  // top 25 chart
  const top25 = [...TEAMS].sort((a,b)=>b.power_score-a.power_score).slice(0,25).reverse();
  Plotly.react('top25-chart', [{
    type:'bar', orientation:'h',
    x: top25.map(t=>t.power_score),
    y: top25.map(t=>t.team.split(' ').slice(-1)[0] + ' (' + (t.conference||'?').split(' ')[0] + ')'),
    marker:{color: top25.map(t => CONF_CLR[t.conference]||'#06b6d4')},
    text: top25.map(t=>t.power_score.toFixed(3)),
    textposition:'outside', textfont:{size:10,color:'#e2e8f0'},
    hovertemplate:'<b>%{y}</b><br>Score: %{x:.3f}<extra></extra>',
  }], {
    ...LAYOUT_BASE,
    title:{text:'Top 25 Power Rankings',font:{color:'#e2e8f0',size:13}},
    xaxis:{...LAYOUT_BASE.xaxis, range:[top25[0].power_score-.3, top25[24].power_score+.4]},
    height:540,
  }, CFG);
}

// ── PROFILE ───────────────────────────────────────────────────────────────────
const PMETS = [
  {col:'pythagorean_win_pct', label:'Pythagorean W%', higher:true,  fmt:v=>v.toFixed(3)},
  {col:'avg_runs_scored',     label:'Offense (RS/G)', higher:true,  fmt:v=>v.toFixed(2)},
  {col:'avg_runs_allowed',    label:'Defense (RA/G)', higher:false, fmt:v=>v.toFixed(2)},
  {col:'avg_run_diff',        label:'Run Diff/G',      higher:true,  fmt:v=>fmtSign(v,2)},
  {col:'elo',                 label:'Elo Rating',     higher:true,  fmt:v=>Math.round(v)},
  {col:'avg_opp_elo',         label:'SOS (Opp Elo)',  higher:true,  fmt:v=>Math.round(v)},
  {col:'recent_win_pct',      label:'Recent Form L15',higher:true,  fmt:v=>v.toFixed(3)},
  {col:'power_score',         label:'Power Score',    higher:true,  fmt:v=>v.toFixed(3)},
];

function renderProfile(team) {
  if (!team) return;
  const t = TEAMS.find(x => x.team === team); if (!t) return;
  const conf = t.conference || 'Unknown';
  const ccolor = CONF_CLR[conf] || '#4a6080';

  document.getElementById('profile-kpis').innerHTML =
    kpiHtml('Rank', '#'+t.rank, `of ${TEAMS.length} teams`, '#eab308') +
    kpiHtml('Elo Rating', Math.round(t.elo), 'init '+ELO_INIT, '#06b6d4') +
    kpiHtml('Record', t.wins+'–'+t.losses, t.win_pct.toFixed(3)+' W%', '#22c55e') +
    kpiHtml('Power Score', (t.power_score||0).toFixed(3), 'composite', '#8b5cf6') +
    `<div class="kpi"><div class="kpi-label">Conference</div><div class="kpi-value" style="font-size:15px;color:${ccolor}">${conf}</div></div>`;

  const labels=[], vals=[], texts=[];
  PMETS.forEach(m => {
    if (t[m.col] == null) return;
    const p = getPct(m.col, t[m.col], m.higher);
    labels.push(m.label); vals.push(p);
    texts.push(m.fmt(t[m.col]) + '  (P' + p + ')');
  });
  const bcolors = vals.map(v => v>=75?'#22c55e':v>=50?'#06b6d4':v>=25?'#eab308':'#ef4444');

  Plotly.react('profile-chart', [{
    type:'bar', orientation:'h',
    x:vals, y:labels, marker:{color:bcolors},
    text:texts, textposition:'outside', textfont:{size:11,color:'#e2e8f0'},
    width:0.55,
    hovertemplate:'<b>%{y}</b><br>Percentile: %{x}<extra></extra>',
  }], {
    ...LAYOUT_BASE,
    title:{text:`${team} — Percentile vs All D-I Teams`, font:{color:'#e2e8f0',size:13}},
    xaxis:{...LAYOUT_BASE.xaxis, range:[0,132], tickvals:[0,25,50,75,100],
             ticktext:['0','25th','50th','75th','100th']},
    yaxis:{...LAYOUT_BASE.yaxis, autorange:'reversed'},
    height:380,
    shapes:[{type:'line',x0:50,x1:50,y0:-.5,y1:labels.length-.5,
              line:{color:'#4a6080',width:1,dash:'dash'}}],
  }, CFG);
}

const RCOLS   = ['pythagorean_win_pct','avg_runs_scored','avg_runs_allowed','avg_run_diff','elo','avg_opp_elo','recent_win_pct'];
const RLABELS = ['Pythag W%','Offense','Defense<br>(inv)','Run Diff','Elo','SOS','Recent<br>Form'];
const RHIGHER = [true,true,false,true,true,true,true];

function renderCompare() {
  const nameA = document.getElementById('compare-a').value;
  const nameB = document.getElementById('compare-b').value;
  if (!nameA || !nameB) { document.getElementById('compare-content').innerHTML='<p style="color:#4a6080">Select both teams.</p>'; return; }
  const A = TEAMS.find(t=>t.team===nameA), B = TEAMS.find(t=>t.team===nameB);
  if (!A||!B) return;

  const valsA = RCOLS.map((c,i) => norm01(c, A[c], RHIGHER[i]));
  const valsB = RCOLS.map((c,i) => norm01(c, B[c], RHIGHER[i]));
  const ang = [...RLABELS, RLABELS[0]];
  const vA  = [...valsA, valsA[0]], vB = [...valsB, valsB[0]];

  const radar = {
    ...LAYOUT_BASE,
    polar:{bgcolor:'#0f1c36',
      radialaxis:{visible:true,range:[0,1],tickvals:[.25,.5,.75],ticktext:['25th','50th','75th'],
                   tickfont:{size:9,color:'#4a6080'},gridcolor:'#1a2f52',linecolor:'#1a2f52'},
      angularaxis:{tickfont:{size:10,color:'#e2e8f0'},gridcolor:'#1a2f52'}},
    legend:{orientation:'h',y:-0.1,x:.5,xanchor:'center',bgcolor:'rgba(0,0,0,0)',font:{size:11}},
    title:{text:'Percentile Comparison',font:{color:'#e2e8f0',size:13}},
    height:400,margin:{l:20,r:20,t:50,b:40},
  };

  const cmpTable = `<table class="cmp-table">
    <thead><tr>
      <th style="text-align:left">Metric</th>
      <th style="color:#06b6d4">${nameA.split(' ').pop()}</th>
      <th></th>
      <th style="color:#8b5cf6">${nameB.split(' ').pop()}</th>
    </tr></thead><tbody>` +
    CMETS.map(m => {
      const va=A[m.col], vb=B[m.col];
      const aWins = va!=null&&vb!=null&&(m.higher?va>vb:va<vb);
      const bWins = va!=null&&vb!=null&&(m.higher?vb>va:vb<va);
      const fa = va==null?'—':(m.sign?fmtSign(va,m.fd):va.toFixed?va.toFixed(m.fd):va);
      const fb = vb==null?'—':(m.sign?fmtSign(vb,m.fd):vb.toFixed?vb.toFixed(m.fd):vb);
      return `<tr>
        <td>${m.label}</td>
        <td class="${aWins?'win':''}" style="color:${aWins?'#06b6d4':'#e2e8f0'}">${fa}</td>
        <td class="arrow">${aWins?'&#9664;':bWins?'&#9654;':'–'}</td>
        <td class="${bWins?'win':''}" style="color:${bWins?'#8b5cf6':'#e2e8f0'}">${fb}</td>
      </tr>`;
    }).join('') + '</tbody></table>';

  document.getElementById('compare-content').innerHTML = `
    <div class="two-col">
      <div class="col-main"><div id="radar-chart" style="height:400px"></div></div>
      <div class="col-side"><div style="background:#0f1c36;border:1px solid #1a2f52;border-radius:8px;padding:10px">${cmpTable}</div></div>
    </div>`;

  Plotly.newPlot('radar-chart', [
    {type:'scatterpolar',r:vA,theta:ang,name:nameA.split(' ').pop(),fill:'toself',
      line:{color:'#06b6d4',width:2},fillcolor:'rgba(6,182,212,.12)',marker:{color:'#06b6d4',size:5}},
    {type:'scatterpolar',r:vB,theta:ang,name:nameB.split(' ').pop(),fill:'toself',
      line:{color:'#8b5cf6',width:2},fillcolor:'rgba(139,92,246,.12)',marker:{color:'#8b5cf6',size:5}},
  ], radar, CFG);
}

// ── PREDICTOR ─────────────────────────────────────────────────────────────────
function renderPredictor() {
  const hn = document.getElementById('pred-home').value;
  const an = document.getElementById('pred-away').value;
  const neutral = document.getElementById('neutral-chk').checked;
  if (!hn||!an) { document.getElementById('pred-content').innerHTML='<p style="color:#4a6080">Select both teams.</p>'; return; }
  const H = TEAMS.find(t=>t.team===hn), A = TEAMS.find(t=>t.team===an);
  if(!H||!A) return;

  const eloH = H.elo + (neutral?0:ELO_HOME);
  const eloA = A.elo;
  const wpH  = eloWP(eloH, eloA), wpA = 1-wpH;
  const rdEst= H.avg_run_diff&&A.avg_run_diff ? (H.avg_run_diff-A.avg_run_diff)*0.4 : 0;
  const fav  = wpH>=.5 ? H : A;
  const favWP= Math.max(wpH,wpA);
  const favColor = favWP>.65?'#22c55e':favWP>.55?'#eab308':'#94a3b8';

  document.getElementById('pred-content').innerHTML = `
    <div class="pred-card">
      <div class="matchup-line">
        <span style="color:#22c55e">${hn}</span>
        <span style="color:#4a6080;font-size:14px;margin:0 10px">vs</span>
        <span style="color:#ef4444">${an}</span>
        <span style="color:#4a6080;font-size:12px;margin-left:10px">${neutral?'(Neutral)':'(Home/Away)'}</span>
      </div>
      <div class="kpi-row">
        ${kpiHtml('Favored', fav.team.split(' ').pop(), favWP.toFixed(1)+'% win prob', favColor)}
        ${kpiHtml('Est. Margin', Math.abs(rdEst)<0.1?'Pick'em':fmtSign(rdEst,1)+' runs',
            Math.abs(rdEst)<0.1?'':fav.team.split(' ').pop()+' edge', '#06b6d4')}
        ${kpiHtml(hn.split(' ').pop()+' Elo', Math.round(H.elo), 'Rank #'+H.rank, '#22c55e')}
        ${kpiHtml(an.split(' ').pop()+' Elo', Math.round(A.elo), 'Rank #'+A.rank, '#ef4444')}
        ${kpiHtml('Elo Gap', Math.round(Math.abs(H.elo-A.elo))+' pts', 'rating diff', '#94a3b8')}
      </div>
    </div>
    <div id="pred-chart" style="height:180px"></div>`;

  Plotly.newPlot('pred-chart', [{
    type:'bar', orientation:'h',
    x:[wpH*100, wpA*100],
    y:[hn.split(' ').pop()+' (Home)', an.split(' ').pop()+' (Away)'],
    marker:{color:['#22c55e','#ef4444']},
    text:[wpH.toFixed(1)+'%', wpA.toFixed(1)+'%'],
    textposition:'inside', textfont:{color:'#000',size:14,family:'Inter'},
    hovertemplate:'<b>%{y}</b>: %{x:.1f}<extra></extra>',
    width:.5,
  }], {
    ...LAYOUT_BASE,
    xaxis:{...LAYOUT_BASE.xaxis,range:[0,100],tickvals:[0,25,50,75,100],ticktext:['0%','25%','50%','75%','100%']},
    yaxis:{...LAYOUT_BASE.yaxis,autorange:'reversed'},
    title:{text:'Win Probability (Elo-based)',font:{color:'#e2e8f0',size:13}},
    height:180, margin:{l:14,r:14,t:38,b:14},
    showlegend:false,
    shapes:[{type:'line',x0:50,x1:50,y0:-.5,y1:1.5,line:{color:'#4a6080',width:1,dash:'dash'}}],
  }, CFG);
}

// ── init ──────────────────────────────────────────────────────────────────────
(function init() {
  // KPI row
  const top = TEAMS[0];
  document.getElementById('kpi-row').innerHTML =
    kpiHtml('Top Ranked', top.team.split(' ').slice(-1)[0], top.conference, '#eab308') +
    kpiHtml('Teams Ranked', TEAMS.length, 'Season '+SEASON, '#06b6d4') +
    kpiHtml('Avg Elo SOS', Math.round(TEAMS.reduce((s,t)=>s+t.avg_opp_elo,0)/TEAMS.length), 'opp Elo', '#8b5cf6') +
    kpiHtml('Avg Run Diff', fmtSign(TEAMS.reduce((s,t)=>s+t.avg_run_diff,0)/TEAMS.length), 'per game', '#22c55e');

  // Conference filter
  const confs = ['ALL', ...new Set(TEAMS.map(t=>t.conference).filter(Boolean).sort())];
  const cf = document.getElementById('conf-filter');
  cf.innerHTML = confs.map(c=>`<option value="${c}">${c==='ALL'?'All Conferences':c}</option>`).join('');

  // Team dropdowns
  populateSelect('profile-select', 'Select a team…');
  populateSelect('compare-a', 'Team A…');
  populateSelect('compare-b', 'Team B…');
  populateSelect('pred-home', 'Home team…');
  populateSelect('pred-away', 'Away team…');

  renderRankings();
})();
</script>
</body>
</html>
